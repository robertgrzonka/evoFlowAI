# Docker Compose configuration with LOCAL MongoDB by default.
# Command: docker compose -f docker-compose.local.yml up
#
# To use MongoDB Atlas for the backend container instead, set MONGODB_URI in a `.env` file
# in this same directory (repo root). Compose substitutes it into the backend service.
# Keep the database segment in the URI (e.g. ...mongodb.net/evoflowai?...).

services:
  # MongoDB Database (Local)
  mongodb:
    image: mongo:7
    container_name: evoflowai-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: evoflowai
      MONGO_INITDB_ROOT_PASSWORD: evoflowai123
      MONGO_INITDB_DATABASE: evoflowai
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - evoflowai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      target: backend-production
    container_name: evoflowai-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI:-mongodb://evoflowai:evoflowai123@mongodb:27017/evoflowai?authSource=admin}
      JWT_SECRET: KPCzErmAHTxg/gjnl82F4whUA7xgB1r8m1zkh3yBWEI=
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALLOWED_ORIGINS: http://localhost:3000,http://web:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - evoflowai-network
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/graphql",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web Application
  web:
    build:
      context: .
      target: web-production
    container_name: evoflowai-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
      NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
      NEXT_PUBLIC_APP_NAME: evoFlowAI
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - evoflowai-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local

networks:
  evoflowai-network:
    driver: bridge
